name: Feature request
description: Suggest an idea or improvement for Doccupine
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is missing or frustrating today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Doccupine to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us understand the request.
